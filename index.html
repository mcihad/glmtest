<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KentOS Console</title>
    <script>
      // No-flash bootstrap: apply saved theme before first paint.
      (function () {
        try {
          var raw = localStorage.getItem('app-theme')
          var cfg = raw ? JSON.parse(raw) : null
          var mode = cfg && cfg.mode ? cfg.mode : 'system'
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var dark = mode === 'dark' || (mode === 'system' && systemDark)
          var root = document.documentElement
          if (dark) root.classList.add('dark')
          root.style.colorScheme = dark ? 'dark' : 'light'
          var fontSize = cfg && typeof cfg.fontSize === 'number' ? cfg.fontSize : 16
          root.style.setProperty('--font-size-base', fontSize + 'px')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
